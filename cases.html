<!-- 
=============================================================================
华南森孚贸易有限公司 - 案例资讯页(Cases)
=============================================================================
文件说明:展示公司典型最新动态,增强客户信任度
页面结构:
  1. 导航栏 - 固定在顶部
  2. 最新动态 - 使用卡片网格布局展示三个典型案例
     - 某大型制造工厂 - 工业润滑油解决方案
     - 某物流运输公司 - 车用润滑油应用
     - 某矿山企业 - 特种润滑油应对极端工况
  3. 页脚版权信息
技术规范:
  - 响应式设计:支持桌面、平板、手机等各种设备
  - Grid 网格布局:自动适应列数
  - Sticky Footer:footer 始终贴合页面底部
=============================================================================
-->

<!DOCTYPE html>  <!-- 声明文档类型为 HTML5 -->
<html lang="zh-CN">  <!-- 设置页面语言为简体中文 -->

<head>
    <!-- 页面元数据配置 -->
    <meta charset="UTF-8">  <!-- 字符编码:UTF-8,支持中文显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                            <!-- 视口设置:响应式关键,确保在移动设备上正确缩放 -->
    <title>案例资讯 - 华南森孚</title>
                            <!-- 页面标题:包含页面主题,利于 SEO -->
    <meta name="description" content="华南森孚成功案例展示:为大型制造工厂提供工业润滑油解决方案,为物流运输公司供应车用润滑油,为矿山企业提供特种润滑油应对极端工况。30+ 年服务经验,值得信赖的润滑专家。">
    <meta name="keywords" content="润滑油应用案例,液压油解决方案,工程机械润滑,制造业润滑案例,物流运输用油,矿山设备润滑,华南森孚客户案例">
    <meta name="author" content="佛山市华南森孚贸易有限公司">
    
    <!-- 网站图标(Favicon):显示在浏览器标签页标题前 -->
    <link rel="icon" href="/images/hn-logo_bg-white.webp" type="image/webp">
    
    <!-- 引入外部资源 -->
    <link rel="stylesheet" href="/css/style.css">  <!-- 主样式表:布局和组件样式 -->
    <link rel="stylesheet" href="/css/images.css">  <!-- 图片资源样式:所有图片路径和显示样式 -->
    <link rel="stylesheet" href="/css/mobile.css" media="(max-width: 1024px)">  <!-- 响应式媒体查询:所有断点适配规则(必须放在最后) -->
    <script src="/js/main.js" defer></script>
                            <!-- JavaScript 文件:defer 延迟到 DOM 加载完成后执行 -->
</head>

<body>  <!-- 页面主体内容开始 -->

    <!-- =========================================================================
         头部导航栏区域
         功能:固定在页面顶部,包含 Logo、导航链接和移动端汉堡菜单
         ========================================================================= -->
    <div id="head-nav-container"></div>

    <!-- =========================================================================
         最新动态区域
         功能:展示典型客户案例,通过实际应用场景增强说服力
         布局:三列网格布局(桌面端),使用卡片组件展示案例图片和描述
         ========================================================================= -->
    <section class="container">  <!-- 内容容器:限制宽度并居中 -->
        
        <!-- 章节主标题 -->
        <h2 class="section-title">最新动态</h2>
        
        <!-- 章节副标题 -->
        <p class="section-subtitle">服务各行业领先企业, 用实际效果证明产品价值与专业能力</p>
        
        <!-- 网格布局容器:自动适应列数 -->
        <div class="grid">
            
            <a href="https://mp.weixin.qq.com/s/WD2MvEW08f3xIrTiJkbg5A" class="card-link">
                <div class="card">
                    <div class="card-image case-img-newyear" 
                         role="img" 
                         aria-label="华南森孚贺新年图片">
                    </div>
                    <div class="card-content">
                        <h3>华南森孚贺新年</h3>
                        <p>飞马奔腾启新程</p>
                    </div>
                </div>
            </a>

            <!-- 案例卡片 1:某大型制造工厂 -->
            <div class="card">
                <!-- 案例图片容器:使用 CSS 背景图显示 -->
                <div class="card-image case-img-factory" 
                     role="img" 
                     aria-label="工厂案例图片">
                </div>
                <!-- 卡片内容区域 -->
                <div class="card-content">
                    <h3>某大型制造工厂</h3>  <!-- 案例名称 -->
                    <p>提供全套工业润滑油解决方案,设备故障率降低 30%。</p>
                        <!-- 案例效果描述 -->
                </div>
            </div>
            
            <!-- 案例卡片 2:某物流运输公司 -->
            <div class="card">
                <div class="card-image case-img-transport" 
                     role="img" 
                     aria-label="运输公司案例图片">
                </div>
                <div class="card-content">
                    <h3>某物流运输公司</h3>
                    <p>车队使用我司车用润滑油,发动机寿命延长 20%。</p>
                </div>
            </div>
            
            <!-- 案例卡片 3:某矿山企业 -->
            <div class="card">
                <div class="card-image case-img-mining" 
                     role="img" 
                     aria-label="矿山案例图片">
                </div>
                <div class="card-content">
                    <h3>某矿山企业</h3>
                    <p>特种润滑油应对极端工况,设备维护成本大幅降低。</p>
                </div>
            </div>
            
        </div>
    </section>

    <!-- =========================================================================
         页脚区域
         功能:显示版权信息、备案号、快速导航和联系方式
         布局:Sticky Footer,始终贴合页面底部
         ========================================================================= -->
    <div id="footer-container"></div>

</body>  <!-- 页面主体结束 -->
</html>  <!-- HTML 文档结束 -->
