<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 佛山市华南森孚有限公司</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo">
                <img src="images/hn-logo-trans.png" alt="佛山市华南森孚有限公司" class="logo-icon">
                <span class="logo-text">佛山市华南森孚有限公司</span>
            </div>
            <div class="menu-toggle" id="mobile-menu">☰</div>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">公司介绍</a></li>
                <li><a href="products.html">产品展示</a></li>
                <li><a href="cases.html">项目案例</a></li>
                <li><a href="contact.html" class="active">联系方式</a></li>
            </ul>
        </div>
    </header>

    <section class="container">
        <h2 class="section-title">联系我们</h2>
        <div class="grid" style="grid-template-columns: 1fr 1fr;">
            <div>
                <h3>公司信息</h3>
                <p><strong>地址：</strong> 北京市朝阳区科技路 88 号</p>
                <p><strong>电话：</strong> 010-12345678</p>
                <p><strong>邮箱：</strong> contact@example.com</p>
                <p><strong>工作时间：</strong> 周一至周五 9:00-18:00</p>
            </div>
            <div>
                <h3>在线留言</h3>
                <form>
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" placeholder="您的姓名">
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" placeholder="您的邮箱">
                    </div>
                    <div class="form-group">
                        <label>留言内容</label>
                        <textarea rows="5" placeholder="请输入您的需求"></textarea>
                    </div>
                    <button type="submit" class="btn">提交</button>
                </form>
            </div>
        </div>
    </section>

<footer>
    <p>&copy; <span id="current-year"></span> 佛山市华南森孚有限公司。All Rights Reserved.</p>
</footer>

    <script>
        const menuToggle = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>
</body>
</html>
