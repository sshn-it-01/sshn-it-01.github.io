<!DOCTYPE html>  <!-- 声明文档类型为 HTML5 -->
<html lang="zh-CN">  <!-- 设置页面语言为简体中文 -->

<head>
    <!-- 页面元数据配置 -->
    <meta charset="UTF-8">  <!-- 字符编码：UTF-8，支持中文显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                            <!-- 视口设置：响应式关键，确保在移动设备上正确缩放 -->
    <title>产品展示 - 华南森孚</title>
                            <!-- 页面标题：包含业务类型，利于 SEO -->
    
    <!-- 网站图标（Favicon）：显示在浏览器标签页标题前 -->
    <link rel="icon" href="images/hn-logo-low.jpg" type="image/jpeg">
    
    <!-- 引入外部资源 -->
    <link rel="stylesheet" href="css/style.css">  <!-- 主样式表 -->
    <script src="js/main.js" defer></script>
                            <!-- JavaScript 文件：defer 延迟到 DOM 加载完成后执行 -->
</head>

<body>  <!-- 页面主体内容开始 -->

    <!-- =========================================================================
         头部导航栏区域
         功能：固定在页面顶部，包含 Logo、导航链接和移动端汉堡菜单
         注意：当前页面在"产品展示"上添加 active 类高亮
         ========================================================================= -->
    <header>  <!-- 语义化标签：页面头部 -->
        <div class="nav-container">  <!-- 导航容器：控制最大宽度和居中 -->
            
            <!-- Logo 区域：包含图形 Logo 和文字 Logo -->
            <div class="logo">
                <!-- 图形 Logo：点击返回首页，aria-label 提供无障碍访问支持 -->
                <a href="index.html" aria-label="公司首页">
                    <span class="logo-icon"></span>  <!-- CSS 背景图显示 Logo -->
                </a>
                <!-- 文字 Logo：公司名称，可点击返回首页 -->
                <a href="index.html" class="logo-text">佛山市华南森孚贸易有限公司</a>
            </div>
            
            <!-- 移动端汉堡菜单按钮：仅在小屏幕显示 -->
            <div class="menu-toggle" id="mobile-menu">☰</div>
            
            <!-- 导航链接列表 -->
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">公司介绍</a></li>
                <li><a href="products.html" class="active">产品展示</a></li>
                    <!-- 当前页面添加 active 类高亮显示 -->
                <li><a href="cases.html">项目案例</a></li>
                <li><a href="contact.html">联系方式</a></li>
            </ul>
        </div>
    </header>

    <!-- =========================================================================
         工业润滑油系列
         功能：展示公司工业润滑油产品，包括液压油、齿轮油、轴承油等
         注意：使用 Grid 布局实现响应式展示
         ========================================================================= -->
    <section class="container" id="industrial-lubricants">
        <h2 class="section-title">工业润滑油系列</h2>
        <div class="grid">
            <a href="product/category/hydraulic-oil.html" class="card-link">
                <div class="card">
                    <div class="card-image card-img-hydraulic"></div>
                    <div class="card-content">
                        <h3>液压油</h3>
                        <p>适用于液压系统，抗氧化、抗磨损性能优异。</p>
                    </div>
                </div>
            </a>
            <div class="card">
                <div class="card-image card-img-gear"></div>
                <div class="card-content">
                    <h3>齿轮油</h3>
                    <p>保护齿轮传动系统，减少摩擦损耗。</p>
                </div>
            </div>
            <div class="card">
                <div class="card-image card-img-bearing"></div>
                <div class="card-content">
                    <h3>轴承油</h3>
                    <p>专为轴承设计，延长设备使用寿命。</p>
                </div>
            </div>
        </div>
    </section>

    <!-- =========================================================================
         车用润滑油系列
         功能：展示公司车用润滑油产品，包括发动机油、变速箱油、刹车油等
         注意：使用 Grid 布局实现响应式展示
         ========================================================================= -->
    <section class="container bg-gray" id="automotive-lubricants">
        <h2 class="section-title">车用润滑油系列</h2>
        <div class="grid">
            <div class="card">
                <div class="card-image card-img-engine"></div>
                <div class="card-content">
                    <h3>发动机油</h3>
                    <p>全合成/半合成机油，保护发动机核心部件。</p>
                </div>
            </div>
            <div class="card">
                <div class="card-image card-img-transmission"></div>
                <div class="card-content">
                    <h3>变速箱油</h3>
                    <p>确保变速箱平稳运行，换挡顺畅。</p>
                </div>
            </div>
            <div class="card">
                <div class="card-image card-img-brake"></div>
                <div class="card-content">
                    <h3>刹车油</h3>
                    <p>高沸点配方，保障制动系统安全。</p>
                </div>
            </div>
        </div>
    </section>

    <!-- =========================================================================
         页脚区域
         功能：显示版权信息、公司名称和 ICP 备案号
         注意：版权年份由 JavaScript 动态填充
         ========================================================================= -->
    <footer>
        <!-- 由 JavaScript 动态填充当前年份 --><!-- 公司名称 --><!-- ICP 备案号 -->
        <p>版权所有 &copy; <span id="current-year"></span> 佛山市华南森孚贸易有限公司   粤ICP备11099622号-2</p>
    </footer>

</body>
</html>
